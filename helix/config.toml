theme = "catppuccin_mocha"

[editor.soft-wrap]
enable = true

[editor.lsp]
enable = true
display-messages = true
display-inlay-hints = false

[editor]
line-number = "relative"
cursorline = true
color-modes = true

[editor.inline-diagnostics]
cursor-line = "warning"
other-lines = "error"

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
